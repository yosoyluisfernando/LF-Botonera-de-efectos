# Configuración reproducible de cargo-about para los binarios distribuidos.
# La herramienta se ejecuta con --frozen --fail: no cambia Cargo.lock, no usa red
# y falla si no puede resolver una licencia.

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "0BSD",
    "Unlicense",
    "CC0-1.0",
    "MIT-0",
    "CDLA-Permissive-2.0",
    "LGPL-2.1-or-later",
]

targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
]

ignore-build-dependencies = true
ignore-dev-dependencies = true
private = { ignore = true }
