name: Release builds

on:
  workflow_dispatch:
    inputs:
      tagName:
        description: Release tag to upload assets to
        required: true
      checkoutRef:
        description: Git ref to build
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-22.04]

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkoutRef }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri bundles
        run: npm run tauri build

      - name: Upload Linux assets
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tagName }}
        shell: bash
        run: |
          find src-tauri/target/release/bundle -type f \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
            -print0 | xargs -0 -I{} gh release upload "$TAG_NAME" "{}" --clobber

      - name: Upload Windows assets
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tagName }}
        shell: pwsh
        run: |
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' } |
            ForEach-Object { gh release upload $env:TAG_NAME $_.FullName --clobber }
